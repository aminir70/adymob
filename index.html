<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AdyMob — نقد درآمد ارزی</title>
<style>
/* AdyMob Design System */
@import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css');

:root {
  --primary: #F59E0B;
  --primary-deep: #D97706;
  --primary-light: #FCD34D;
  --primary-bg: #FEF3C7;
  --accent: #FBBF24;
  --bg: #FFFBF5;
  --bg-soft: #FDF6EC;
  --bg-card: #FFFFFF;
  --border: #F3E8D6;
  --border-strong: #E5D5B7;
  --text: #1A1408;
  --text-soft: #4A3F2A;
  --text-mute: #8A7B5C;
  --text-faint: #B8A982;
  --green: #10B981;
  --red: #EF4444;
  --blue: #3B82F6;
  --shadow-sm: 0 1px 2px rgba(180,120,30,.06), 0 1px 3px rgba(180,120,30,.04);
  --shadow-md: 0 4px 12px rgba(180,120,30,.08), 0 2px 4px rgba(180,120,30,.04);
  --shadow-lg: 0 12px 32px rgba(180,120,30,.12), 0 4px 8px rgba(180,120,30,.06);
  --shadow-xl: 0 24px 60px rgba(180,120,30,.16);
  --shadow-orange: 0 8px 24px rgba(245,158,11,.25);
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 24px;
  --font: 'Vazirmatn', system-ui, sans-serif;
}

[data-theme="dark"] {
  --bg: #14110A;
  --bg-soft: #1F1A0F;
  --bg-card: #1F1A0F;
  --border: #2E2614;
  --border-strong: #3D3320;
  --text: #FEF3C7;
  --text-soft: #E8DBBE;
  --text-mute: #A89779;
  --text-faint: #6B5E42;
  --primary-bg: #2E2614;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  margin: 0;
  direction: rtl;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss03";
}

.num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

.h1 { font-size: clamp(36px, 5vw, 60px); font-weight: 800; line-height: 1.1; letter-spacing: -0.02em; margin: 0; }
.h2 { font-size: clamp(28px, 3.5vw, 40px); font-weight: 800; line-height: 1.2; letter-spacing: -0.015em; margin: 0; }
.h3 { font-size: clamp(20px, 2.2vw, 26px); font-weight: 700; line-height: 1.3; margin: 0; }
.h4 { font-size: 17px; font-weight: 700; margin: 0; }
.lead { font-size: 17px; color: var(--text-soft); line-height: 1.7; margin: 0; }
.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: 999px;
  background: var(--primary-bg); color: var(--primary-deep);
  font-size: 12.5px; font-weight: 600; letter-spacing: 0.01em;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 24px;
  box-shadow: var(--shadow-sm);
}
.card-hover { transition: transform .2s, box-shadow .2s, border-color .2s; }
.card-hover:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--border-strong); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--font); font-size: 14.5px; font-weight: 600;
  padding: 11px 18px; border-radius: 999px;
  border: 1px solid transparent;
  cursor: pointer; transition: all .15s;
  text-decoration: none;
  white-space: nowrap;
}
.btn-lg { padding: 14px 24px; font-size: 15px; }
.btn-primary { background: var(--primary); color: #fff; box-shadow: var(--shadow-orange); }
.btn-primary:hover { background: var(--primary-deep); transform: translateY(-1px); box-shadow: 0 12px 28px rgba(245,158,11,.35); }
.btn-outline { background: transparent; color: var(--text); border-color: var(--border-strong); }
.btn-outline:hover { background: var(--bg-soft); border-color: var(--primary); }
.btn-ghost { background: var(--bg-soft); color: var(--text); }
.btn-ghost:hover { background: var(--primary-bg); color: var(--primary-deep); }

.input {
  width: 100%;
  font-family: var(--font); font-size: 15px;
  padding: 12px 16px;
  border: 1px solid var(--border-strong);
  border-radius: var(--r-md);
  background: var(--bg-card);
  color: var(--text);
  transition: border-color .15s, box-shadow .15s;
  outline: none;
}
.input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(245,158,11,.15); }

.tabs { display: flex; gap: 4px; padding: 4px; background: var(--bg-soft); border-radius: 999px; border: 1px solid var(--border); }
.tab { flex: 1; padding: 10px 16px; border-radius: 999px; cursor: pointer; font-size: 13.5px; font-weight: 600; color: var(--text-mute); text-align: center; transition: all .15s; border: none; background: transparent; font-family: var(--font); }
.tab.active { background: var(--bg-card); color: var(--primary-deep); box-shadow: var(--shadow-sm); }

.dot-grid {
  background-image: radial-gradient(circle, var(--border-strong) 1px, transparent 1px);
  background-size: 24px 24px;
}

@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
.fade-up { animation: fadeUp .5s ease-out both; }

@keyframes pulse-orange { 0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,.4); } 50% { box-shadow: 0 0 0 6px rgba(16,185,129,0); } }

@media (max-width: 880px) {
  .hero-grid { grid-template-columns: 1fr !important; }
  .h1 { font-size: 36px !important; }
}
</style>

// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.
//
// Owns the host protocol (listens for __activate_edit_mode / __deactivate_edit_mode,
// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so
// individual prototypes don't re-roll it. Ships a consistent set of controls so you
// don't hand-draw <input type="range">, segmented radios, steppers, etc.
//
// Usage (in an HTML file that loads React + Babel):
//
//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
//     "primaryColor": "#D97757",
//     "fontSize": 16,
//     "density": "regular",
//     "dark": false
//   }/*EDITMODE-END*/;
//
//   function App() {
//     const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
//     return (
//       <div style={{ fontSize: t.fontSize, color: t.primaryColor }}>
//         Hello
//         <TweaksPanel>
//           <TweakSection label="Typography" />
//           <TweakSlider label="Font size" value={t.fontSize} min={10} max={32} unit="px"
//                        onChange={(v) => setTweak('fontSize', v)} />
//           <TweakRadio  label="Density" value={t.density}
//                        options={['compact', 'regular', 'comfy']}
//                        onChange={(v) => setTweak('density', v)} />
//           <TweakSection label="Theme" />
//           <TweakColor  label="Primary" value={t.primaryColor}
//                        onChange={(v) => setTweak('primaryColor', v)} />
//           <TweakToggle label="Dark mode" value={t.dark}
//                        onChange={(v) => setTweak('dark', v)} />
//         </TweaksPanel>
//       </div>
//     );
//   }
//
// ─────────────────────────────────────────────────────────────────────────────

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {

      <div className="twk-sect">{label}</div>
      {children}

}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>

}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

// ===== Calculator =====
function Calculator({ defaultTab = 'youtube' }) {
  const [tab, setTab] = useState(defaultTab);
  const [val, setVal] = useState(1000);
  const calc = useMemo(() => {
    const fee = tab === 'youtube' ? 0.04 : tab === 'admob' ? 0.05 : 0.06;
    const usd = val;
    const tomanGross = usd * USD_RATE;
    const feeAmount = tomanGross * fee;
    const net = tomanGross - feeAmount;
    return { usd, gross: tomanGross, fee: feeAmount, net, feePct: fee * 100 };
  }, [val, tab]);
  return (
    <div className="card" style={{ padding: 24, boxShadow: 'var(--shadow-lg)' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
        <h3 style={{ fontSize: 17, fontWeight: 700, margin: 0 }}>محاسبه درآمد</h3>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '4px 10px', background: 'var(--primary-bg)', color: 'var(--primary-deep)', borderRadius: 999, fontSize: 12, fontWeight: 600 }}>
          <span style={{ width: 6, height: 6, background: 'var(--green)', borderRadius: '50%' }}/>
          نرخ زنده
        </div>
      </div>
      <div className="tabs" style={{ marginBottom: 18 }}>
        <button className={`tab ${tab === 'youtube' ? 'active' : ''}`} onClick={() => setTab('youtube')}>YouTube</button>
        <button className={`tab ${tab === 'admob' ? 'active' : ''}`} onClick={() => setTab('admob')}>AdMob</button>
        <button className={`tab ${tab === 'adsense' ? 'active' : ''}`} onClick={() => setTab('adsense')}>AdSense</button>
      </div>
      <label style={{ fontSize: 13, color: 'var(--text-mute)', marginBottom: 6, display: 'block' }}>مبلغ (دلار)</label>
      <div style={{ position: 'relative', marginBottom: 8 }}>
        <input type="number" value={val} onChange={(e) => setVal(+e.target.value || 0)} className="input num" style={{ paddingLeft: 56, fontSize: 18, fontWeight: 700 }}/>
        <span style={{ position: 'absolute', left: 16, top: '50%', transform: 'translateY(-50%)', fontSize: 14, color: 'var(--text-mute)', fontWeight: 600 }}>USD</span>
      </div>
      <input type="range" min="100" max="20000" step="100" value={val} onChange={(e) => setVal(+e.target.value)} style={{ width: '100%', accentColor: 'var(--primary)' }}/>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--text-faint)', marginBottom: 18 }}>
        <span>$۱۰۰</span><span>$۲۰٬۰۰۰</span>
      </div>
      <div style={{ background: 'var(--bg-soft)', borderRadius: 14, padding: 16, marginBottom: 16 }}>
        <Row label="معادل تومانی" value={fmt.toman(calc.gross) + ' ت'}/>
        <Row label={`کارمزد (${calc.feePct}٪)`} value={'− ' + fmt.toman(calc.fee) + ' ت'} muted/>
        <div style={{ height: 1, background: 'var(--border)', margin: '12px 0' }}/>
        <Row label="مبلغ نهایی واریزی" value={fmt.toman(calc.net) + ' تومان'} bold large/>
      </div>
      <button className="btn btn-primary" style={{ width: '100%' }}>
        ثبت سفارش با این مبلغ <I.ArrowLeft/>
      </button>
    </div>
  );
}

function Row({ label, value, muted, bold, large }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '4px 0' }}>
      <span style={{ fontSize: 13, color: muted ? 'var(--text-mute)' : 'var(--text-soft)' }}>{label}</span>
      <span className="num" style={{ fontSize: large ? 20 : 14, fontWeight: bold ? 800 : 600, color: bold ? 'var(--primary-deep)' : 'var(--text)' }}>{value}</span>

  );
}

// ===== App =====
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = useState('home');
  useEffect(() => {
    document.documentElement.dataset.theme = tweaks.dark ? 'dark' : 'light';
    document.documentElement.style.setProperty('--primary', tweaks.primary);
    document.documentElement.style.setProperty('--primary-deep', shade(tweaks.primary, -0.15));
  }, [tweaks.dark, tweaks.primary]);
  useEffect(() => { window.scrollTo(0, 0); }, [route]);
  return (
    <div>
      <Header route={route} setRoute={setRoute}/>
      {route === 'home' && <HomePage tweaks={tweaks} setRoute={setRoute}/>}
      {route === 'about' && <AboutPage setRoute={setRoute}/>}
      {route === 'blog' && <BlogPage setRoute={setRoute}/>}
      {route === 'contact' && <ContactPage/>}
      {SERVICES.map(s => s.id).includes(route) && <ServicePage id={route} setRoute={setRoute}/>}
      <Footer setRoute={setRoute}/>
      <TweaksPanel title="Tweaks">
        <TweakSection title="ظاهر">
          <TweakRadio label="چیدمان Hero" value={tweaks.heroLayout} onChange={(v) => setTweak('heroLayout', v)} options={[
            { value: 'split', label: 'دو ستونه' },
            { value: 'centered', label: 'مرکزی' },
            { value: 'editorial', label: 'مجله‌ای' },
          ]}/>
          <TweakRadio label="استایل کارت سرویس" value={tweaks.cardStyle} onChange={(v) => setTweak('cardStyle', v)} options={[
            { value: 'warm', label: 'گرم' },
            { value: 'minimal', label: 'مینیمال' },
            { value: 'gradient', label: 'گرادیان' },
          ]}/>
          <TweakToggle label="حالت تاریک" value={tweaks.dark} onChange={(v) => setTweak('dark', v)}/>
          <TweakColor label="رنگ اصلی" value={tweaks.primary} onChange={(v) => setTweak('primary', v)}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

function shade(hex, percent) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  const f = (x) => Math.max(0, Math.min(255, Math.round(x + x * percent)));
  return '#' + [f(r), f(g), f(b)].map(x => x.toString(16).padStart(2, '0')).join('');
}
